spring:
  application:
    name: calendar-api
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/calendar_mvp}
    username: ${POSTGRES_USER:calendar}
    password: ${POSTGRES_PASSWORD:calendar}
  flyway:
    enabled: true
  jackson:
    property-naming-strategy: LOWER_CAMEL_CASE

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me-dev-secret-change-me}
    expires-in-seconds: ${JWT_EXPIRES_IN:86400}
  timezone: ${APP_TIMEZONE:Asia/Seoul}
  holiday:
    provider-mode: ${HOLIDAY_PROVIDER_MODE:mock}
    api-key: ${HOLIDAY_API_KEY:${PUBLIC_HOLIDAY_API_KEY:}}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
