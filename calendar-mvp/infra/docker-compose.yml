services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-calendar_mvp}
      POSTGRES_USER: ${POSTGRES_USER:-calendar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-calendar}
    ports:
      - "5432:5432"
    volumes:
      - calendar_postgres_cluster:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-calendar} -d ${POSTGRES_DB:-calendar_mvp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../apps/api
    environment:
      DATABASE_URL: ${DATABASE_URL:-jdbc:postgresql://postgres:5432/calendar_mvp}
      POSTGRES_USER: ${POSTGRES_USER:-calendar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-calendar}
      JWT_SECRET: ${JWT_SECRET:-change-me-to-at-least-32-characters-calendar-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-86400}
      HOLIDAY_API_KEY: ${HOLIDAY_API_KEY:-}
      PUBLIC_HOLIDAY_API_KEY: ${PUBLIC_HOLIDAY_API_KEY:-}
      HOLIDAY_PROVIDER_MODE: ${HOLIDAY_PROVIDER_MODE:-mock}
      APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Seoul}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ../apps/web
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost/api/v1}
    depends_on:
      - api
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.29-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api

volumes:
  calendar_postgres_cluster:
