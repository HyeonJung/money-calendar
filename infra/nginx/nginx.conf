events {}

http {
  upstream web {
    server web:3000;
  }

  upstream api {
    server api:8080;
  }

  server {
    listen 80;
    server_name _;

    location /api/v1/ {
      proxy_pass http://api/api/v1/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /actuator/ {
      proxy_pass http://api/actuator/;
    }

    location /health {
      proxy_pass http://web/health;
    }

    location / {
      proxy_pass http://web;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}
